server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: любой 404 возвращает index.html
    error_page 404 =200 /index.html;

    # Кэширование для статических файлов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy через Docker network на nginx container
    location /api/ {
        proxy_pass http://azyk_nginx:80/api/;
        proxy_set_header Host localhost:8000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host localhost:8000;
    }

    # WebSocket proxy через Docker network
    location /ws {
        proxy_pass http://azyk_websocket:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Основное приложение
    location / {
        try_files $uri /index.html;
    }
}

