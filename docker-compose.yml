name: azyk-transport

services:
  backend-setup:
    build:
      context: ./backend-api
      dockerfile: docker/php/Dockerfile
    container_name: azyk_backend_setup
    working_dir: /var/www/html
    environment: &backend-env
      APP_NAME: "AZYK Transport"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:npaBrMIRpgDWmAx0atHgvePveRxglb1nM40XjaMw4rU=
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: azyk_transport
      DB_USERNAME: azyk
      DB_PASSWORD: azyk
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: azyk
      REVERB_APP_KEY: azyk-key
      REVERB_APP_SECRET: azyk-secret
      REVERB_HOST: websocket
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      OCR_SERVICE_URL: http://ocr:8001
      OCR_SERVICE_TIMEOUT: 180
      ODOMETER_GPS_REVIEW_THRESHOLD_KM: 5
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    command: sh docker/php/scripts/setup.sh
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      ocr:
        condition: service_healthy

  backend:
    build:
      context: ./backend-api
      dockerfile: docker/php/Dockerfile
    container_name: azyk_backend
    working_dir: /var/www/html
    environment:
      <<: *backend-env
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    command: sh docker/php/scripts/wait-for-setup.sh php-fpm
    depends_on:
      backend-setup:
        condition: service_completed_successfully

  queue:
    build:
      context: ./backend-api
      dockerfile: docker/php/Dockerfile
    container_name: azyk_queue
    working_dir: /var/www/html
    environment:
      <<: *backend-env
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    command: sh docker/php/scripts/wait-for-setup.sh php artisan queue:work --sleep=1 --tries=3
    depends_on:
      backend-setup:
        condition: service_completed_successfully
      redis:
        condition: service_started
      ocr:
        condition: service_healthy

  ocr:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: azyk_ocr
    volumes:
      - ocr_models:/models/paddleocr
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  websocket:
    build:
      context: ./backend-api
      dockerfile: docker/php/Dockerfile
    container_name: azyk_websocket
    working_dir: /var/www/html
    environment:
      <<: *backend-env
      REVERB_HOST: 0.0.0.0
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    command: sh docker/php/scripts/wait-for-setup.sh php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8080"
    depends_on:
      backend-setup:
        condition: service_completed_successfully
      redis:
        condition: service_started

  nginx:
    build:
      context: ./backend-api
      dockerfile: docker/nginx/Dockerfile
    container_name: azyk_nginx
    volumes:
      - backend_storage:/var/www/html/storage:ro
    ports:
      - "8000:80"
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: azyk_postgres
    environment:
      POSTGRES_DB: azyk_transport
      POSTGRES_USER: azyk
      POSTGRES_PASSWORD: azyk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: azyk_redis
    ports:
      - "6379:6379"

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: docker/Dockerfile
    container_name: azyk_admin_panel
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_WS_HOST: localhost
      VITE_WS_PORT: 8081
    volumes:
      - ./admin-panel:/app
      - admin_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "test -d node_modules/vite || npm install --include=optional && npm run dev -- --host 0.0.0.0"
    depends_on:
      nginx:
        condition: service_started

volumes:
  postgres_data:
  backend_storage:
  backend_cache:
  ocr_models:
  admin_node_modules:
