name: azyk-transport

services:
  backend-setup:
    build:
      context: ./backend-api
      dockerfile: docker/php/Dockerfile
    container_name: azyk_backend_setup
    working_dir: /var/www/html
    environment: &backend-env
      APP_NAME: "AZYK Transport"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:npaBrMIRpgDWmAx0atHgvePveRxglb1nM40XjaMw4rU=
      APP_URL: http://${ADMIN_HOST:-localhost}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: azyk_transport
      DB_USERNAME: azyk
      DB_PASSWORD: azyk
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: azyk
      REVERB_APP_KEY: azyk-key
      REVERB_APP_SECRET: azyk-secret
      REVERB_HOST: websocket
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      OCR_SERVICE_URL: http://ocr:8001
      OCR_SERVICE_TIMEOUT: 45
      ODOMETER_GPS_REVIEW_THRESHOLD_KM: 5
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://${ADMIN_HOST:-localhost}:5173
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    command: sh docker/php/scripts/setup.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  backend:
    build:
      context: ./backend-api
      dockerfile: docker/php/Dockerfile
    container_name: azyk_backend
    working_dir: /var/www/html
    environment:
      <<: *backend-env
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    command: sh docker/php/scripts/wait-for-setup.sh php-fpm
    depends_on:
      backend-setup:
        condition: service_completed_successfully

  queue:
    build:
      context: ./backend-api
      dockerfile: docker/php/Dockerfile
    container_name: azyk_queue
    working_dir: /var/www/html
    environment:
      <<: *backend-env
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    command: sh docker/php/scripts/wait-for-setup.sh php artisan queue:work --sleep=1 --tries=3
    depends_on:
      backend-setup:
        condition: service_completed_successfully
      redis:
        condition: service_started

  ocr:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: azyk_ocr
    volumes:
      - ocr_models:/root/.paddleocr
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  websocket:
    build:
      context: ./backend-api
      dockerfile: docker/php/Dockerfile
    container_name: azyk_websocket
    working_dir: /var/www/html
    environment:
      <<: *backend-env
      REVERB_HOST: 0.0.0.0
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache
    command: sh docker/php/scripts/wait-for-setup.sh php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8080"
    depends_on:
      backend-setup:
        condition: service_completed_successfully
      redis:
        condition: service_started

  nginx:
    build:
      context: ./backend-api
      dockerfile: docker/nginx/Dockerfile
    container_name: azyk_nginx
    volumes:
      - backend_storage:/var/www/html/storage:ro
      - admin_public:/var/www/html/public/admin:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
      admin-build:
        condition: service_completed_successfully

  admin-build:
    image: node:22-alpine
    container_name: azyk_admin_build
    working_dir: /app
    environment:
      VITE_PUBLIC_BASE: ${ADMIN_PUBLIC_BASE:-/}
      VITE_API_URL: ${ADMIN_API_URL:-/api}
      VITE_WS_HOST: ${ADMIN_HOST:-localhost}
      VITE_WS_PORT: ${ADMIN_WS_PORT:-8081}
    volumes:
      - ./admin-panel:/app
      - admin_build_node_modules:/app/node_modules
      - admin_public:/admin-dist
    command: sh -c "npm ci --include=optional && npm run build && rm -rf /admin-dist/* && cp -R dist/. /admin-dist/"

  postgres:
    image: postgres:16-alpine
    container_name: azyk_postgres
    environment:
      POSTGRES_DB: azyk_transport
      POSTGRES_USER: azyk
      POSTGRES_PASSWORD: azyk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azyk -d azyk_transport"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: azyk_redis
    ports:
      - "6379:6379"

  admin-panel:
    profiles:
      - dev
    build:
      context: ./admin-panel
      dockerfile: docker/Dockerfile
    container_name: azyk_admin_panel
    working_dir: /app
    environment:
      VITE_PUBLIC_BASE: /
      VITE_API_URL: http://${ADMIN_HOST:-localhost}/api
      VITE_WS_HOST: ${ADMIN_HOST:-localhost}
      VITE_WS_PORT: ${ADMIN_DEV_WS_PORT:-8081}
    volumes:
      - ./admin-panel:/app
      - admin_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "test -d node_modules/vite || npm ci --include=optional && npm run dev -- --host 0.0.0.0"
    depends_on:
      nginx:
        condition: service_started

volumes:
  postgres_data:
  backend_storage:
  backend_cache:
  ocr_models:
  admin_node_modules:
  admin_build_node_modules:
  admin_public:
